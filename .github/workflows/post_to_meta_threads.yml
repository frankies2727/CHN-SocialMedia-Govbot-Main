name: govbot-meta-threads-post-lgbtq

on:
  schedule:
    - cron: "27 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: govbot-meta-threads-post
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LLM_MODEL: "gemma3:4b"
      BOT_TOPIC: "lgbtq"
      POST_LIMIT: "3"
      DRY_RUN: "0"

    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB free; govbot clones across 50+ states
        # plus the Ollama LLM blow past that, which makes the runner crash with
        # "No space left on device". Strip out preinstalled tooling we never
        # use to recover ~30 GB before anything else runs.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from PDFs for the
        # Threads summaries; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot, fetch all supported states, dump JSONL
        # Clone each state one-at-a-time. Govbot panics on unsupported states,
        # so we wrap each call in `|| echo "skipped"` to keep going.
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true

          STATES="al ak az ar ca co ct de fl ga hi id il in ia ks ky la me md ma mi mn ms mo mt ne nv nh nj nm ny nc nd oh ok or pa ri sc sd tn tx ut vt va wa wv wi wy dc pr"
          for state in $STATES; do
            echo "--- Cloning $state ---"
            govbot clone "$state" 2>&1 || echo "  SKIPPED $state (not supported by govbot)"
          done

          govbot logs --limit 169200 > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list

      - name: Post to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          LLM_API_URL: "http://localhost:11434/api/chat"
        run: python scripts/post_to_meta_threads.py

      - name: Commit Threads state changes
        if: env.DRY_RUN != '1'
        run: |
          git config user.name  "govbot-meta-threads[bot]"
          git config user.email "govbot-meta-threads[bot]@users.noreply.github.com"
          git add topics/*/meta-threads/bills_used.json topics/*/meta-threads/bills_raw topics/*/meta-threads/bills_full_text || true
          if git diff --cached --quiet; then
            echo "No Threads state changes to commit."
          else
            git commit -m "chore: update Threads posted state [skip ci]"
            git push
          fi

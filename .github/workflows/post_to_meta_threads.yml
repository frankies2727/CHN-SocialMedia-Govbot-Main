name: govbot-meta-threads-post

on:
  schedule:
    - cron: "27 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: govbot-meta-threads-post
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # The single Threads account now spans every topic, so this job loops over
    # all topics/ in one sequential run (not sharded — one account, one writer to
    # the shared account-level dedup ledger + daily cap). BOT_TOPIC is set per
    # topic inside the post step.
    env:
      LLM_MODEL: "gemma3:4b"
      DRY_RUN: "0"

    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB free; govbot clones across 50+ states
        # plus the Ollama LLM blow past that, which makes the runner crash with
        # "No space left on device". Strip out preinstalled tooling we never
        # use to recover ~30 GB before anything else runs.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from PDFs for the
        # Threads summaries; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot, fetch all supported states, dump JSONL
        # Resilient install (retries the daily-republished upstream nightly) plus
        # a per-day shared bills.jsonl cache, so only the first poster of the day
        # pays the full national clone. See .github/actions/govbot-bills.
        uses: ./.github/actions/govbot-bills

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Cache extracted bill text
        # bill_text.py caches PDF-extracted text in .bill_text_cache/, keyed by
        # a hash of the document URL — content-addressed, so entries never go
        # stale. Persisting it across runs skips re-downloading and re-running
        # pdftotext for bills already processed on an earlier day (bills stay in
        # the freshness window for weeks). The run-scoped key always saves a
        # fresh, grown cache; restore-keys pulls the most recent prior one, and
        # the shared prefix lets every poster reuse text any other already
        # fetched.
        uses: actions/cache@v4
        with:
          path: .bill_text_cache
          key: bill-text-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bill-text-cache-

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list
          # Warm the model into memory now (pinned via keep_alive) so the first
          # real summary doesn't pay the cold-load cost on the critical path.
          curl -fsS http://localhost:11434/api/generate \
            -d "{\"model\":\"$LLM_MODEL\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"30m\"}" \
            > /dev/null 2>&1 || echo "  (warm-up failed; model will load on first summary)"

      - name: Post to Threads (all topics)
        # One account, every topic: build the normalized bill list once, then walk
        # the topics in randomized order so coverage rotates fairly day to day.
        # The account-level daily cap (ACCOUNT_DAILY_LIMIT) stops the loop once
        # enough has gone out, and the account ledger keeps a bill matched by two
        # topics from posting twice.
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          # Per-topic cap kept at 1 so the global cap (4) spreads across several
          # different topics each day rather than being eaten by the first one.
          POST_LIMIT: "1"
          ACCOUNT_DAILY_LIMIT: "4"
        run: |
          shopt -s nullglob
          # Build the normalized (extract_fields-applied) bill list once; every
          # topic below reads it via BILLS_NORMALIZED instead of re-parsing
          # bills.jsonl. Importing the module needs BOT_TOPIC, so use any topic.
          FIRST_TOPIC=""
          for d in topics/*/; do
            [ -f "$d/config.yml" ] && FIRST_TOPIC=$(basename "$d") && break
          done
          if BOT_TOPIC="$FIRST_TOPIC" python scripts/post_to_bluesky.py --build-normalized bills_normalized.json; then
            export BILLS_NORMALIZED="$PWD/bills_normalized.json"
          else
            echo "  normalized build failed; topics will parse bills.jsonl directly."
          fi

          for topic in $(ls -d topics/*/ | xargs -n1 basename | shuf); do
            [ -f "topics/$topic/config.yml" ] || continue
            echo "=== Threads: topic $topic ==="
            BOT_TOPIC="$topic" python scripts/post_to_meta_threads.py \
              || echo "  $topic post failed, continuing with next topic"
          done

      - name: Commit Threads state changes
        if: env.DRY_RUN != '1'
        run: |
          git config user.name  "govbot-meta-threads[bot]"
          git config user.email "govbot-meta-threads[bot]@users.noreply.github.com"
          git add topics/*/meta-threads/bills_used.json topics/*/meta-threads/bills_raw topics/*/meta-threads/bills_full_text account_state/meta-threads || true
          if git diff --cached --quiet; then
            echo "No Threads state changes to commit."
            exit 0
          fi
          git commit -m "chore: update Threads posted state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt); rebasing and retrying."
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            sleep $(( attempt * 2 ))
          done

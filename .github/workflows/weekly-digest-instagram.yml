name: govbot-instagram-weekly-digest

on:
  # Friday afternoon, staggered after the Bluesky (17:00), X (14:27), and Threads
  # (15:27) digests so the four don't race the shared govbot fetch / Ollama install.
  schedule:
    - cron: "42 15 * * FRI"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-instagram-weekly-digest
  cancel-in-progress: false

defaults:
  run:
    shell: bash

# The Instagram feed is a single account (one set of INSTAGRAM_* secrets) that
# spans EVERY topic, so this digest covers all topics/ folders in one weekly
# carousel — up to DIGEST_MAX_HIGHLIGHTS bill cards drawn from a wide variety of
# topics, each card tagged with its topic. (The daily Instagram poster already
# interleaves all topics the same way.) BOT_TOPIC below is only an import
# bootstrap: post_to_instagram.py resolves an active topic at import time, so it
# must name a valid topic, but the digest itself iterates over all of them.

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LLM_MODEL: "gemma3:4b"
      BOT_TOPIC: "lgbtq"
      DRY_RUN: "0"
      DIGEST_LOOKBACK_DAYS: "7"
      DIGEST_MAX_HIGHLIGHTS: "11"
      DIGEST_PER_STATE_CAP: "2"

    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB free; govbot clones across 50+ states
        # plus the Ollama LLM blow past that, which makes the runner crash with
        # "No space left on device". Strip out preinstalled tooling we never
        # use to recover ~30 GB before anything else runs.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false  # keep swap: the LLM + full bill corpus need the RAM headroom

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        # The digest commits + pushes the rendered carousel card PNGs itself,
        # mid-run, so Instagram can fetch them from raw.githubusercontent before
        # the publish call. Identity must be set before that push.
        run: |
          git config user.name  "govbot-instagram[bot]"
          git config user.email "govbot-instagram[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from PDFs for the
        # digest summaries; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot, fetch all supported states, dump JSONL
        # Resilient install (retries the daily-republished upstream nightly) plus
        # a per-day shared bills.jsonl cache. See .github/actions/govbot-bills.
        uses: ./.github/actions/govbot-bills
        with:
          log-limit: "8200"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Cache extracted bill text
        # bill_text.py caches PDF-extracted text in .bill_text_cache/, keyed by
        # a hash of the document URL — content-addressed, so entries never go
        # stale. Persisting it across runs skips re-downloading and re-running
        # pdftotext for bills already processed on an earlier day (bills stay in
        # the freshness window for weeks). The run-scoped key always saves a
        # fresh, grown cache; restore-keys pulls the most recent prior one, and
        # the shared prefix lets every poster reuse text any other already
        # fetched.
        uses: actions/cache@v4
        with:
          path: .bill_text_cache
          key: bill-text-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bill-text-cache-

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list
          # Smoke-test the model, but DON'T pin it in memory (keep_alive:0
          # unloads it right after). Holding the 3.3GB model resident while the
          # next step loads the full bill corpus into RAM pushed the 16GB runner
          # over its memory limit, freezing the VM until GitHub killed the job
          # mid-step ("runner has received a shutdown signal"). The first real
          # summary reloads the model on demand.
          curl -fsS http://localhost:11434/api/generate \
            -d "{\"model\":\"$LLM_MODEL\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"0\"}" \
            > /dev/null 2>&1 || echo "  (warm-up failed; model will load on first summary)"

      - name: Build and post Instagram weekly-digest carousel
        # Renders one card per selected bill, commits + pushes them (so they're
        # reachable by raw.githubusercontent URL), waits for the CDN, then builds
        # and publishes a single carousel via the Instagram Graph API.
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LLM_API_URL: "http://localhost:11434/api/chat"
        run: python scripts/weekly_digest_instagram.py

      - name: Commit Instagram digest artifacts
        if: env.DRY_RUN != '1'
        run: |
          # The digest pushed the carousel card commit mid-run; this commits the
          # raw-record trail. Rebase-retry in case the remote moved underneath us.
          git add topics/*/instagram/weekly_digest/bills_raw topics/*/instagram/weekly_digest/bills_full_text || true
          if git diff --cached --quiet; then
            echo "No Instagram digest artifacts to commit."
            exit 0
          fi
          git commit -m "chore: update Instagram weekly-digest artifacts [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt); rebasing and retrying."
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            sleep $(( attempt * 2 ))
          done

name: collect-samples

# A standalone workflow that fetches govbot data and saves a batch of full
# bill records into the samples/ folder.
#
# By default it does NOT post anything — it just saves samples. It never
# overwrites existing samples: each run adds new files alongside whatever is
# already there. Filenames include a short hash of the record's contents, so
# re-running won't duplicate identical records but WILL save new variations
# (e.g. the same bill with a newer log action) as separate files.
#
# Optionally the bills picked this run can ALSO be composed for one designated
# topic's account — on Bluesky, X, or both — reusing the same force-post path as
# the post_*_specific_bill workflows. Set publish=true to actually post them, or
# leave publish off and turn dry_run on to compose a preview without posting.
# Either way a specific topic (not 'all') must be selected. Composing/publishing
# is independent of sample-saving: the picked bills are always written to
# samples/ regardless of what you choose here.

on:
  workflow_dispatch:
    inputs:
      sample_count:
        description: "How many records to save this run"
        required: false
        default: "4"
      states:
        description: "Space-separated state codes to fetch (e.g. 'il in mi')"
        required: false
        default: "il in mi wi oh ia mn mo"
      from_month:
        description: "Earliest action month, MM-YYYY (e.g. '04-2025'). Empty = no lower bound."
        required: false
        default: ""
      to_month:
        description: "Latest action month, MM-YYYY (e.g. '07-2025'). Empty = no upper bound. Inclusive."
        required: false
        default: ""
      topic:
        description: "Topic to filter samples by (and to compose/publish for when publish or dry_run is on). 'all' = no topic filter; a specific topic is required to compose or publish."
        required: false
        type: choice
        default: all
        options:
          # >>> topic-options extra=all (generated by scripts/sync_topic_choices.py — do not edit by hand)
          - all
          - ai_data_centers
          - criminal_justice
          - education
          - elections_voting_rights
          - environment_climate
          - healthcare
          - housing
          - immigration
          - labor
          - lgbtq
          - reproductive_rights
          - taxation
          - transportation
          # <<< topic-options

      # --- Optional publishing knobs ---------------------------------------
      publish:
        description: "Actually publish the bills picked this run to the selected topic's account (samples are saved either way; requires a specific topic, not 'all'). Leave off + turn dry_run on to compose a preview without posting."
        required: false
        type: boolean
        default: false
      publish_target:
        description: "Where to publish / which account to compose for (used when publish or dry_run is on)"
        required: false
        type: choice
        default: bluesky
        options:
          - bluesky
          - x
          - both
      dry_run:
        description: "Compose posts for the selected topic but skip actually publishing. Turn this on (with publish off) to preview composed posts without posting."
        required: false
        type: boolean
        default: false
      force_repost:
        description: "Bypass the bills_used.json dedup gate (allows re-posting already-posted bills)"
        required: false
        type: boolean
        default: false
      update_state_file:
        description: "Append the posted bills to the topic's bills_used.json"
        required: false
        type: boolean
        default: true
      save_raw_record:
        description: "Write the verbatim bill record to the topic's bills_raw/"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LLM_MODEL: "gemma3:4b"
    steps:
      - name: Free disk space
        # Only needed when composing/publishing, since that pulls the Ollama LLM
        # (~3.3 GB) on top of the govbot clones. Strip out preinstalled tooling
        # we never use to avoid "No space left on device".
        if: ${{ inputs.publish || inputs.dry_run }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        # Required so scripts/topic.py (and post_to_*.py) can import PyYAML,
        # tweepy, atproto, etc. Without this the topic filter / publish steps
        # crash with "ModuleNotFoundError: No module named 'yaml'".
        run: pip install -r requirements.txt

      - name: Install govbot, fetch data, dump JSONL
        # Resilient install (retries the daily-republished upstream nightly).
        # shared-cache off: ad-hoc state selections shouldn't reuse a daily dump.
        uses: ./.github/actions/govbot-bills
        with:
          clone-target: ${{ github.event.inputs.states }}
          log-limit: "2200"
          shared-cache: "false"

      - name: Save sample records into samples/ (no overwrite)
        env:
          SAMPLE_COUNT: ${{ github.event.inputs.sample_count }}
          FROM_MONTH: ${{ github.event.inputs.from_month }}
          TO_MONTH: ${{ github.event.inputs.to_month }}
          TOPICS: ${{ inputs.topic == 'all' && '' || inputs.topic }}
        run: |
          python <<'PY'
          import hashlib, json, os, random, re, sys
          from pathlib import Path

          SAMPLES_DIR = Path("samples")
          SAMPLES_DIR.mkdir(parents=True, exist_ok=True)

          STATE_TAG = re.compile(r"\bstate:([a-z]{2})\b", re.IGNORECASE)

          def find_state(rec):
              def walk(o):
                  if isinstance(o, str):
                      m = STATE_TAG.search(o)
                      return m.group(1).upper() if m else ""
                  if isinstance(o, dict):
                      for v in o.values():
                          s = walk(v)
                          if s: return s
                  if isinstance(o, list):
                      for v in o:
                          s = walk(v)
                          if s: return s
                  return ""
              return walk(rec) or "unknown"

          MONTH_RE = re.compile(r"^(\d{2})-(\d{4})$")

          def parse_month(label, raw):
              raw = (raw or "").strip()
              if not raw:
                  return None
              m = MONTH_RE.match(raw)
              if not m:
                  raise SystemExit(f"{label} must be MM-YYYY (got {raw!r})")
              mm, yyyy = int(m.group(1)), int(m.group(2))
              if not (1 <= mm <= 12):
                  raise SystemExit(f"{label} month out of range: {raw!r}")
              return (yyyy, mm)

          def record_year_month(rec):
              # Match post_to_bluesky.py:182-194 — prefer log.action.date,
              # fall back to top-level timestamp (YYYYMMDDTHHMMSSZ).
              date_raw = (((rec.get("log") or {}).get("action") or {}).get("date") or "")[:10]
              if len(date_raw) >= 7 and date_raw[4] == "-":
                  try:
                      return (int(date_raw[:4]), int(date_raw[5:7]))
                  except ValueError:
                      pass
              ts = (rec.get("timestamp") or "")[:8]
              if len(ts) == 8 and ts.isdigit():
                  return (int(ts[:4]), int(ts[4:6]))
              return None

          from_ym = parse_month("from_month", os.environ.get("FROM_MONTH"))
          to_ym = parse_month("to_month", os.environ.get("TO_MONTH"))

          def in_range(rec):
              if from_ym is None and to_ym is None:
                  return True
              ym = record_year_month(rec)
              if ym is None:
                  return False
              if from_ym is not None and ym < from_ym:
                  return False
              if to_ym is not None and ym > to_ym:
                  return False
              return True

          # Optional topic filter — uses scripts/topic.py:Topic.matches()
          topic_names = (os.environ.get("TOPICS") or "").split()
          topics = []
          if topic_names:
              sys.path.insert(0, "scripts")
              from topic import Topic, list_topics  # type: ignore
              available = list_topics()
              unknown = [n for n in topic_names if n not in available]
              if unknown:
                  raise SystemExit(
                      f"Unknown topic{'' if len(unknown)==1 else 's'}: "
                      f"{', '.join(unknown)}. Available: {', '.join(available)}"
                  )
              topics = [Topic.load(n) for n in topic_names]

          def topic_for(rec):
              # Returns the first selected topic whose keyword regex matches
              # this record's bill, or None if no topic fits.
              bill = rec.get("bill") or {}
              subjects_raw = bill.get("subjects")
              if subjects_raw is None:
                  subj_list = bill.get("subject") or []
                  subjects_raw = " ".join(subj_list) if isinstance(subj_list, list) else str(subj_list)
              probe = {
                  "title": bill.get("title") or "",
                  "abstract": bill.get("abstract") or "",
                  "subjects": subjects_raw or "",
              }
              for topic in topics:
                  if topic.matches(probe):
                      return topic.name
              return None

          # Read all records
          records = []
          with open("bills.jsonl", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      records.append(json.loads(line))
                  except json.JSONDecodeError:
                      pass

          print(f"Read {len(records)} records from bills.jsonl")
          if not records:
              raise SystemExit(0)

          target = int(os.environ.get("SAMPLE_COUNT", "30") or "30")

          random.seed()  # use real randomness so re-runs collect variety

          # Apply date filter first (cheap), then topic bucketing.
          dated = [r for r in records if in_range(r)]
          dropped_date = len(records) - len(dated)
          if from_ym or to_ym:
              print(f"Date filter kept {len(dated)} of {len(records)} records "
                    f"(dropped {dropped_date}).")

          picks = []
          if topics:
              # buckets[topic_name][state] = [records]
              buckets = {t.name: {} for t in topics}
              kept = 0
              for r in dated:
                  tname = topic_for(r)
                  if tname is None:
                      continue
                  buckets[tname].setdefault(find_state(r), []).append(r)
                  kept += 1
              for st_map in buckets.values():
                  for items in st_map.values():
                      random.shuffle(items)
              print(f"Topic filter kept {kept} of {len(dated)} records "
                    f"across {len(topics)} topic"
                    f"{'' if len(topics)==1 else 's'}.")

              # Round-robin: outer loop topics (in user order), inner
              # loop states within each topic. One pick per (topic, state)
              # tick.
              while len(picks) < target and any(
                  any(st_map[s] for s in st_map) for st_map in buckets.values()
              ):
                  progressed = False
                  for topic in topics:
                      st_map = buckets[topic.name]
                      for s in sorted(st_map.keys()):
                          if not st_map[s]:
                              continue
                          picks.append(st_map[s].pop())
                          progressed = True
                          if len(picks) >= target:
                              break
                      if len(picks) >= target:
                          break
                  if not progressed:
                      break
          else:
              # No topic filter — keep the original per-state round-robin.
              by_state = {}
              for r in dated:
                  by_state.setdefault(find_state(r), []).append(r)
              for items in by_state.values():
                  random.shuffle(items)
              state_keys = sorted(by_state.keys())
              while len(picks) < target and any(by_state[s] for s in state_keys):
                  for s in state_keys:
                      if not by_state[s]:
                          continue
                      picks.append(by_state[s].pop())
                      if len(picks) >= target:
                          break

          # Emit the bills picked this run as a manifest so an optional publish
          # step can force-post each one. One "state<TAB>identifier" line per
          # pick. We list every pick (not just newly-saved sample files) so
          # publishing covers the full set selected this run.
          with open("picked_bills.tsv", "w", encoding="utf-8") as mf:
              written = 0
              for rec in picks:
                  st = find_state(rec).lower()
                  ident = (rec.get("bill") or {}).get("identifier") or rec.get("id") or ""
                  ident = str(ident).strip()
                  if not st or st == "unknown" or not ident:
                      continue
                  mf.write(f"{st}\t{ident}\n")
                  written += 1
          print(f"Wrote picked_bills.tsv with {written} publishable pick(s).")

          # Existing filenames so we know what to skip
          existing = {p.name for p in SAMPLES_DIR.iterdir() if p.is_file()}

          new_files = 0
          for rec in picks:
              # Build filename: state-identifier-shortHash.json
              state = find_state(rec).lower() or "unknown"
              ident = (rec.get("bill") or {}).get("identifier") or rec.get("id") or "unknown"
              safe_ident = re.sub(r"[^A-Za-z0-9_-]+", "_", str(ident)).strip("_") or "unknown"

              # Hash of content so the same record doesn't pile up across runs,
              # but a *different* record for the same bill (new log action) does.
              blob = json.dumps(rec, sort_keys=True, ensure_ascii=False).encode("utf-8")
              short_hash = hashlib.sha256(blob).hexdigest()[:8]

              fname = f"{state}-{safe_ident}-{short_hash}.json"
              if fname in existing:
                  continue
              (SAMPLES_DIR / fname).write_text(
                  json.dumps(rec, indent=2, sort_keys=True, ensure_ascii=False),
                  encoding="utf-8",
              )
              existing.add(fname)
              new_files += 1
              print(f"  + {fname}")

          total = sum(1 for p in SAMPLES_DIR.iterdir() if p.is_file())
          print(f"\nAdded {new_files} new file(s). samples/ now has {total} total.")
          PY

      # --- Optional publishing -----------------------------------------------
      # Ollama (local LLM) is only needed to summarize bills for posting, so
      # these steps run only when publish=true.
      - name: Install poppler-utils (pdftotext)
        # Only needed when composing/publishing, since that's the only path
        # that summarizes bills and therefore extracts full bill text from
        # PDFs. Mirrors the daily post + weekly-digest workflows.
        if: ${{ inputs.publish || inputs.dry_run }}
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Cache Ollama model
        if: ${{ inputs.publish || inputs.dry_run }}
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        if: ${{ inputs.publish || inputs.dry_run }}
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Install Ollama and pull the LLM model
        if: ${{ inputs.publish || inputs.dry_run }}
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list

      - name: Compose (and, unless dry-run, publish) picked bills for the topic
        if: ${{ inputs.publish || inputs.dry_run }}
        env:
          # toJSON(secrets) exposes the whole secret map so post_to_bluesky.py
          # can read BLUESKY_HANDLE_<NAME> / BLUESKY_APP_PASSWORD_<NAME> for the
          # chosen topic at runtime.
          ALL_SECRETS: ${{ toJSON(secrets) }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          BOT_TOPIC: ${{ inputs.topic }}
          PUBLISH_TARGET: ${{ inputs.publish_target }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          FORCE_REPOST: ${{ inputs.force_repost && '1' || '0' }}
          SAVE_STATE: ${{ inputs.update_state_file && '1' || '0' }}
          SAVE_RAW: ${{ inputs.save_raw_record && '1' || '0' }}
        run: |
          if [ "$BOT_TOPIC" = "all" ]; then
            echo "Composing/publishing requires a specific topic, but topic is 'all'. Select a topic to compose or publish for."
            exit 1
          fi
          if [ ! -s picked_bills.tsv ]; then
            echo "No publishable bills were picked this run; nothing to compose or publish."
            exit 0
          fi
          echo "Composing $(wc -l < picked_bills.tsv) bill(s) for '$BOT_TOPIC' "
          echo "(target=$PUBLISH_TARGET, dry_run=$DRY_RUN, force_repost=$FORCE_REPOST, "
          echo " save_state=$SAVE_STATE, save_raw=$SAVE_RAW)"
          failures=0
          while IFS=$'\t' read -r st bill || [ -n "$st" ]; do
            [ -z "$st" ] && continue
            echo "=== $st $bill -> $BOT_TOPIC ==="
            export FORCE_STATE="$st"
            export FORCE_BILL_ID="$bill"
            if [ "$PUBLISH_TARGET" = "bluesky" ] || [ "$PUBLISH_TARGET" = "both" ]; then
              python scripts/post_to_bluesky.py || { echo "  ! bluesky publish failed for $st $bill"; failures=$((failures+1)); }
            fi
            if [ "$PUBLISH_TARGET" = "x" ] || [ "$PUBLISH_TARGET" = "both" ]; then
              python scripts/post_to_x.py || { echo "  ! X publish failed for $st $bill"; failures=$((failures+1)); }
            fi
          done < picked_bills.tsv
          echo "Publishing done with $failures failure(s)."

      - name: Commit new samples (and any published state)
        run: |
          git config user.name  "samples-bot"
          git config user.email "samples-bot@users.noreply.github.com"
          git add samples/ || true
          if [ "${{ inputs.publish }}" = "true" ] && [ "${{ inputs.dry_run }}" != "true" ]; then
            git add topics/*/bills_used.json topics/*/bills_raw topics/*/bills_full_text || true
            git add topics/*/x*/bills_used.json topics/*/x*/bills_raw topics/*/x*/bills_full_text || true
          fi
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "samples: add new bill records [skip ci]"
            git push
          fi

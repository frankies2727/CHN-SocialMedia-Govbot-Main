name: govbot-x-post-specific-bill

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic / X account to post to"
        required: true
        type: choice
        options:
          # >>> topic-options (generated by scripts/sync_topic_choices.py — do not edit by hand)
          - ai_data_centers
          - criminal_justice
          - education
          - elections_voting_rights
          - environment_climate
          - healthcare
          - housing
          - immigration
          - labor
          - lgbtq
          - reproductive_rights
          - taxation
          - transportation
          # <<< topic-options
      state:
        description: "Two-letter state code (e.g. il, ca, ny)"
        required: true
        type: string
      bill_id:
        description: "Bill identifier (e.g. HB123, SB 45)"
        required: true
        type: string
      dry_run:
        description: "Dry-run: create post but skip publishing to X"
        required: false
        type: boolean
        default: true
      force_repost:
        description: "Bypass the x/bills_used.json dedup gate (allows re-posting)"
        required: false
        type: boolean
        default: false
      update_state_file:
        description: "Append the posted bill to x/bills_used.json (uncheck for a one-off post that won't block future runs)"
        required: false
        type: boolean
        default: true
      save_raw_record:
        description: "Write the verbatim bill record to x/bills_raw/"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: govbot-x-post-specific-bill
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LLM_MODEL: "gemma3:4b"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from the bill's PDF
        # for the X summary; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          ls -la scripts/
          test -f scripts/post_to_x.py && echo "OK" || (echo "MISSING" && exit 1)

      - name: Install govbot, fetch requested state, dump JSONL
        env:
          INPUT_STATE: ${{ inputs.state }}
        run: |
          # The upstream "nightly" release is deleted and recreated daily, so its
          # tag 404s for a short window each day. Retry with backoff to ride it out.
          for attempt in 1 2 3 4 5; do
            curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash && break
            echo "govbot install attempt ${attempt}/5 failed (nightly may be mid-republish); retrying..."
            sleep $(( attempt * 10 ))
          done
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true

          state="$(echo "$INPUT_STATE" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -z "$state" ]; then
            echo "ERROR: state input is empty." >&2
            exit 1
          fi
          echo "--- Cloning $state ---"
          govbot clone "$state"

          # `govbot logs --limit` is a PER-REPO cap and `--filter default`
          # applies a per-repo AI relevance filter. For a forced-bill run we
          # need every action for the state (the user typed the bill ID, so
          # don't let the AI filter decide if it's "relevant"). --filter none
          # turns the filter off; --limit none returns the full history.
          govbot logs --limit none --filter none > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list

      - name: Post specific bill to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          BOT_TOPIC: ${{ inputs.topic }}
          FORCE_STATE: ${{ inputs.state }}
          FORCE_BILL_ID: ${{ inputs.bill_id }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          FORCE_REPOST: ${{ inputs.force_repost && '1' || '0' }}
          SAVE_STATE: ${{ inputs.update_state_file && '1' || '0' }}
          SAVE_RAW: ${{ inputs.save_raw_record && '1' || '0' }}
        run: python scripts/post_to_x.py

      - name: Commit X state changes
        if: ${{ inputs.update_state_file || inputs.save_raw_record }}
        run: |
          git config user.name  "govbot-x[bot]"
          git config user.email "govbot-x[bot]@users.noreply.github.com"
          git add topics/*/x*/bills_used.json topics/*/x*/bills_raw topics/*/x*/bills_full_text || true
          if git diff --cached --quiet; then
            echo "No X state changes to commit."
          else
            git commit -m "chore: post specific bill ${{ inputs.state }} ${{ inputs.bill_id }} to ${{ inputs.topic }} on X [skip ci]"
            git push
          fi

name: pages-dashboard

# Rebuilds docs/data.json from the latest post history and publishes the
# dark-mode dashboard to GitHub Pages.
#
# The posting workflows commit their new posts with "[skip ci]", which skips
# every workflow — so a plain push trigger would never see new posts. Instead we
# trigger on each posting workflow COMPLETING (workflow_run ignores [skip ci]),
# which makes the dashboard refresh within a couple of minutes of any new post.
# The push/schedule/manual triggers remain as backstops.
on:
  workflow_run:
    workflows:
      - govbot-meta-threads-post
      - govbot-x-post-ai-data-centers-including-crypto
      - govbot-instagram-post
      - govbot-bluesky-post
      - govbot-posts-extravaganza
      - govbot-meta-threads-weekly-digest
      - govbot-x-weekly-digest
      - govbot-instagram-weekly-digest
      - govbot-bluesky-weekly-digest
      - govbot-x-post-specific-bill
      - govbot-bluesky-post-specific-bill
    types: [completed]
  push:
    branches: [main]
    paths:
      - "account_state/**"
      - "topics/**/bills_used.json"
      - "docs/**"
      - "scripts/build_dashboard.py"
      - ".github/workflows/pages-dashboard.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

# Standard permissions for the GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Always build from the tip of main. On a workflow_run trigger the
          # event SHA is the poster's pre-post commit, but the new post is a
          # later "[skip ci]" commit on main — so pin the ref to get it.
          ref: main
          # Full history so build_dashboard.py can read each post's commit date
          # (used to order the feed by the day it was actually posted).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dashboard data
        run: python scripts/build_dashboard.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

name: govbot-meta-threads-refresh-token

on:
  # Weekly is plenty: Threads long-lived tokens last 60 days and refreshing
  # rolls that window forward. Runs Mondays; also triggerable by hand.
  schedule:
    - cron: "0 7 * * MON"
  workflow_dispatch:

# Read-only here; the refreshed token is written back via the GitHub REST API
# using THREADS_REFRESH_PAT (a PAT with secrets:write), NOT the workflow token.
permissions:
  contents: read

concurrency:
  group: govbot-meta-threads-refresh-token
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Refresh Threads long-lived token
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          # Optional: a PAT with `secrets: write` on this repo enables writing
          # the refreshed token back into the THREADS_ACCESS_TOKEN secret. Omit
          # it and the step still refreshes + reports without leaking the token.
          THREADS_REFRESH_PAT: ${{ secrets.THREADS_REFRESH_PAT }}
        run: python scripts/refresh_meta_threads_token.py

name: govbot-state-extravaganza

# Manual-only "Extravaganza": an on-demand digest thread that spotlights recent
# bill activity, posted to one platform. It runs in one of two framings, chosen
# by the `mode` knob:
#   * state  — STATE-first: a "🏛️ State Extravaganza!! 🧵" thread whose header
#              leads with the hand-picked state(s), spotlighting those
#              statehouses' most significant bills for a topic.
#   * topic  — TOPIC-first: a "🎯 Topic Extravaganza!! 🧵" thread whose header
#              leads with the topic, spotlighting that issue's most significant
#              bills wherever they're moving (all states by default).
# Both modes share the SAME selection pipeline (topic + state + lookback
# filters) and post one thread per selected topic — only the header/cover copy
# differs. Pick the lookback (never more than 62 days) and ship the thread,
# exactly like the weekly digest (a formal root + one threaded reply per bill).
# See scripts/state_extravaganza.py.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Extravaganza framing: 'state' leads with the state(s); 'topic' leads with the topic (nationwide by default). Same bills either way — only the header/cover copy changes."
        required: true
        type: choice
        default: state
        options:
          - state
          - topic
      platform:
        description: "Which platform to post the thread to"
        required: true
        type: choice
        default: bluesky
        options:
          - bluesky
          - x
          - threads
          - instagram
      states:
        description: "States to pull bills from — space/comma separated 2-letter codes (e.g. 'CA NY TX'). Leave blank for all states."
        required: false
        type: string
        default: ""
      topics:
        # GitHub workflow_dispatch has no multi-select input, so this is a
        # free-text list (like `states` above). Each selected topic posts its
        # OWN thread: on Bluesky that's one thread per topic to each topic's
        # dedicated account; on Threads/Instagram (single multi-topic accounts)
        # it's several threads/carousels to the same account. IGNORED when
        # platform is X — that feed is a single fixed-topic account.
        description: "Topic(s) to post to — space/comma separated folder names, or 'all'. One thread per topic. Available: ai_data_centers, criminal_justice, education, elections_voting_rights, environment_climate, healthcare, housing, immigration, labor, lgbtq, reproductive_rights, taxation, transportation. (Ignored for X.)"
        required: false
        type: string
        default: lgbtq
      num_posts:
        description: "Number of bill posts in the thread"
        required: false
        type: number
        default: 6
      lookback_days:
        description: "Recency window in days (HARD-CAPPED at 62 — larger values are clamped)"
        required: false
        type: number
        default: 62
      dry_run:
        description: "Dry-run: compose and print the thread without publishing"
        required: false
        type: choice
        default: "0"
        options:
          - "0"
          - "1"

permissions:
  contents: write

concurrency:
  group: govbot-state-extravaganza
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  extravaganza:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LLM_MODEL: "gemma3:4b"
      # The X feed is a single account (one set of X_* secrets) dedicated to one
      # topic, so the `topic` input is ignored for X and BOT_TOPIC is pinned
      # here instead. Mirrors weekly-digest-x.yml. Change if the X bot is ever
      # pointed at a different topic.
      X_BOT_TOPIC: "ai_data_centers"

    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB free; the govbot clone plus the Ollama
        # LLM blow past that ("No space left on device"). Strip preinstalled
        # tooling we never use to recover ~30 GB before anything else runs.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false  # keep swap: the LLM + bill corpus need the RAM headroom

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        # The Instagram path commits + pushes the rendered carousel cards itself,
        # mid-run, so Instagram can fetch them from raw.githubusercontent before
        # the publish call. Identity must be set before that push. Harmless for
        # the text platforms, which don't push mid-run.
        run: |
          git config user.name  "govbot-state-extravaganza[bot]"
          git config user.email "govbot-state-extravaganza[bot]@users.noreply.github.com"

      - name: Resolve run config
        id: cfg
        env:
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_STATES: ${{ inputs.states }}
          INPUT_TOPICS: ${{ inputs.topics }}
        run: |
          # govbot clone takes space-separated lowercase state codes (see the
          # specific-bill workflow). Normalize the form input (commas -> spaces,
          # lowercase) into a clone target; blank means clone every state.
          states="$(echo "$INPUT_STATES" | tr ',' ' ' | tr '[:upper:]' '[:lower:]' | xargs || true)"
          if [ -z "$states" ]; then
            echo "clone_target=all"  >> "$GITHUB_OUTPUT"
            echo "shared_cache=true"  >> "$GITHUB_OUTPUT"   # a full clone can reuse the daily shared dump
            # A national pull stays bounded + relevance-filtered like the digests,
            # so an all-states run doesn't dump millions of unfiltered records.
            echo "log_limit=8200" >> "$GITHUB_OUTPUT"
            echo "log_filter=" >> "$GITHUB_OUTPUT"
          else
            echo "clone_target=$states" >> "$GITHUB_OUTPUT"
            echo "shared_cache=false" >> "$GITHUB_OUTPUT"   # an ad-hoc state subset shouldn't be cached/reused
            # Only a few states are cloned, so load their FULL action log with
            # govbot's relevance filter OFF and no cap — the script's own topic +
            # 62-day filters then decide, so nothing topical gets pre-dropped.
            echo "log_limit=none" >> "$GITHUB_OUTPUT"
            echo "log_filter=none" >> "$GITHUB_OUTPUT"
          fi

          # Resolve the topic list the post step loops over. X is a single
          # fixed-topic account, so it ignores the input and always runs the one
          # X topic. Every other platform posts one thread PER selected topic
          # ('all' expands to every topics/ folder; blank falls back to lgbtq).
          if [ "$INPUT_PLATFORM" = "x" ]; then
            echo "topics=${X_BOT_TOPIC}" >> "$GITHUB_OUTPUT"
          else
            topics_in="$(echo "$INPUT_TOPICS" | tr ',' ' ' | tr '[:upper:]' '[:lower:]' | xargs || true)"
            if [ -z "$topics_in" ]; then
              topics_in="lgbtq"
            elif [ "$topics_in" = "all" ]; then
              topics_in="$(for d in topics/*/; do [ -f "$d/config.yml" ] && basename "$d"; done | xargs)"
            fi
            echo "topics=$topics_in" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from PDFs for the
        # summaries; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot, fetch requested states, dump JSONL
        # Resilient install (retries the daily-republished upstream nightly).
        # clone-target is the chosen state subset (or 'all'); shared-cache is
        # off for ad-hoc subsets so they're never reused by other runs.
        uses: ./.github/actions/govbot-bills
        with:
          clone-target: ${{ steps.cfg.outputs.clone_target }}
          shared-cache: ${{ steps.cfg.outputs.shared_cache }}
          log-limit: ${{ steps.cfg.outputs.log_limit }}
          log-filter: ${{ steps.cfg.outputs.log_filter }}

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. a new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Cache extracted bill text
        # bill_text.py content-addresses PDF-extracted text in .bill_text_cache/,
        # so entries never go stale. Persisting it skips re-downloading and
        # re-running pdftotext for bills already processed on an earlier run.
        uses: actions/cache@v4
        with:
          path: .bill_text_cache
          key: bill-text-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bill-text-cache-

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list
          # Smoke-test the model, but DON'T pin it in memory (keep_alive:0 unloads
          # it right after) — holding the 3.3GB model resident while the next step
          # loads the bill corpus into RAM can push the runner over its memory
          # limit. The first real summary reloads the model on demand.
          curl -fsS http://localhost:11434/api/generate \
            -d "{\"model\":\"$LLM_MODEL\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"0\"}" \
            > /dev/null 2>&1 || echo "  (warm-up failed; model will load on first summary)"

      - name: Build and post the State Extravaganza thread
        env:
          # All platforms' secrets are exposed; the script only reads the ones
          # for the selected PLATFORM. Bluesky resolves per-topic handle/password
          # from ALL_SECRETS (see scripts/topic.py).
          ALL_SECRETS: ${{ toJSON(secrets) }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          PLATFORM: ${{ inputs.platform }}
          EXTRAVAGANZA_MODE: ${{ inputs.mode }}
          EXTRAVAGANZA_STATES: ${{ inputs.states }}
          NUM_POSTS: ${{ inputs.num_posts }}
          EXTRAVAGANZA_LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          DRY_RUN: ${{ inputs.dry_run }}
          RUN_TOPICS: ${{ steps.cfg.outputs.topics }}
        run: |
          # One State Extravaganza per selected topic, against the same cloned
          # bills.jsonl. On Bluesky each topic logs into its own account; on
          # Threads/Instagram each posts a separate thread/carousel to the one
          # shared account. (For X, RUN_TOPICS is just the single X topic.)
          rc=0
          for topic in $RUN_TOPICS; do
            if [ ! -f "topics/$topic/config.yml" ]; then
              echo "::warning::unknown topic '$topic' (no topics/$topic/config.yml); skipping."
              continue
            fi
            echo "=== ${EXTRAVAGANZA_MODE:-state} Extravaganza: topic $topic (platform ${PLATFORM}) ==="
            BOT_TOPIC="$topic" python scripts/state_extravaganza.py \
              || { echo "  $topic failed, continuing with next topic"; rc=1; }
          done
          exit $rc

      - name: Commit State Extravaganza artifacts
        if: inputs.dry_run != '1'
        run: |
          git config user.name  "govbot-state-extravaganza[bot]"
          git config user.email "govbot-state-extravaganza[bot]@users.noreply.github.com"
          # The raw artifacts land in each platform's weekly_digest/ folder
          # (the script reuses the digest persistence helpers).
          # Instagram carousel cards are committed mid-run by the poster; this
          # final commit catches the bills_raw / full-text artifacts saved after.
          git add topics/*/weekly_digest/bills_raw \
                  topics/*/x*/weekly_digest/bills_raw topics/*/x*/weekly_digest/bills_full_text \
                  topics/*/meta-threads/weekly_digest/bills_raw topics/*/meta-threads/weekly_digest/bills_full_text \
                  topics/*/instagram/cards topics/*/instagram/bills_raw topics/*/instagram/bills_full_text \
                  || true
          if git diff --cached --quiet; then
            echo "No State Extravaganza artifacts to commit."
          else
            git commit -m "chore: update State Extravaganza artifacts [skip ci]"
            git push
          fi

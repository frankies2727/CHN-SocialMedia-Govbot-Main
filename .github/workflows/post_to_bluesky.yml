name: govbot-bluesky-post

on:
  schedule:
    # 3x a week on Mon/Wed/Fri (cron days 1,3,5) at 13:12 UTC ≈ 9:12 AM ET,
    # catching Bluesky's news/policy audience in the morning news cycle. GitHub
    # cron is fixed UTC and ignores DST, so during EST this lands an hour earlier
    # local. Odd minute (:12) dodges the top-of-hour scheduler congestion.
    - cron: "12 13 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-bluesky-post
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Split the 13 topics across three shards that run in parallel on separate
    # runners. Each shard repeats the shared setup (govbot clone + Ollama) but
    # only posts ~a third of the topics, keeping each job well under the
    # 60-minute budget that the two-shard split still occasionally blew past.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    env:
      LLM_MODEL: "gemma3:4b"
    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB free; govbot clones across 50+ states
        # plus the Ollama LLM blow past that, which makes the runner crash with
        # "No space left on device". Strip out preinstalled tooling we never
        # use to recover ~30 GB before anything else runs.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false  # keep swap: the LLM + full bill corpus need the RAM headroom

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # pdftotext extracts the full bill text from each bill's PDF so
        # summaries are grounded in the real legislation. It's a system
        # binary, not a pip package; scripts/bill_text.py degrades gracefully
        # to abstract-only if it's missing.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          ls -la scripts/
          test -f scripts/post_to_bluesky.py && echo "OK" || (echo "MISSING" && exit 1)

      - name: Install govbot, fetch all supported states, dump JSONL
        # Resilient install (retries the daily-republished upstream nightly) plus
        # a per-day shared bills.jsonl cache, so only the first poster of the day
        # pays the full national clone. See .github/actions/govbot-bills.
        uses: ./.github/actions/govbot-bills

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Cache extracted bill text
        # bill_text.py caches PDF-extracted text in .bill_text_cache/, keyed by
        # a hash of the document URL — content-addressed, so entries never go
        # stale. Persisting it across runs skips re-downloading and re-running
        # pdftotext for bills already processed on an earlier day (bills stay in
        # the freshness window for weeks). The run-scoped key always saves a
        # fresh, grown cache; restore-keys pulls the most recent prior one, and
        # the shared prefix lets every poster reuse text any other already
        # fetched. The shard suffix keeps the two parallel shards from racing on
        # the same save key.
        uses: actions/cache@v4
        with:
          path: .bill_text_cache
          key: bill-text-cache-${{ github.run_id }}-${{ github.run_attempt }}-shard${{ matrix.shard }}
          restore-keys: |
            bill-text-cache-

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            # Snapshot binary + libs so the next run skips the ~600 MB download.
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          # Start Ollama in the background; logs to /tmp for debugging.
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          # Wait for the server to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          # Skip the pull entirely if the model is already on disk (cache hit);
          # otherwise do the full ~3.3 GB download.
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list
          # Smoke-test the model, but DON'T pin it in memory (keep_alive:0
          # unloads it right after). Holding the 3.3GB model resident while the
          # next step loads the full bill corpus into RAM pushed the 16GB runner
          # over its memory limit, freezing the VM until GitHub killed the job
          # mid-step ("runner has received a shutdown signal"). The first real
          # summary reloads the model on demand.
          curl -fsS http://localhost:11434/api/generate \
            -d "{\"model\":\"$LLM_MODEL\",\"prompt\":\"ok\",\"stream\":false,\"keep_alive\":\"0\"}" \
            > /dev/null 2>&1 || echo "  (warm-up failed; model will load on first summary)"

      - name: Filter, summarize, and post to Bluesky (all topics)
        env:
          # toJSON(secrets) exposes the entire secret map so dropping in a new
          # topic never requires editing this workflow. The script reads
          # BLUESKY_HANDLE_<NAME> / BLUESKY_APP_PASSWORD_<NAME> from this map
          # at runtime based on BOT_TOPIC.
          ALL_SECRETS: ${{ toJSON(secrets) }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          POST_LIMIT: "2"
        run: |
          shopt -s nullglob
          # Parse bills.jsonl + run extract_fields ONCE for this shard, then
          # point every per-topic process below at the result via
          # BILLS_NORMALIZED. This step is topic-independent, but importing the
          # module needs BOT_TOPIC, so pass the first available topic.
          FIRST_TOPIC=""
          for d in topics/*/; do
            [ -f "$d/config.yml" ] && FIRST_TOPIC=$(basename "$d") && break
          done
          if BOT_TOPIC="$FIRST_TOPIC" python scripts/post_to_bluesky.py --build-normalized bills_normalized.json; then
            export BILLS_NORMALIZED="$PWD/bills_normalized.json"
          else
            echo "  normalized build failed; topics will parse bills.jsonl directly."
          fi

          # Assign topics to this shard by their sorted position (topics/*/
          # globs alphabetically). index % NUM_SHARDS interleaves them into a
          # balanced 5/4/4 split that auto-rebalances when topics are added.
          SHARD="${{ matrix.shard }}"
          NUM_SHARDS=3
          i=0
          for topic_dir in topics/*/; do
            topic=$(basename "$topic_dir")
            [ -f "$topic_dir/config.yml" ] || continue
            if [ $(( i % NUM_SHARDS )) -ne "$SHARD" ]; then
              i=$(( i + 1 )); continue
            fi
            i=$(( i + 1 ))
            echo "=== Posting for topic: $topic (shard $SHARD/$NUM_SHARDS) ==="
            BOT_TOPIC="$topic" python scripts/post_to_bluesky.py \
              || echo "  $topic post failed, continuing with next topic"
          done

      - name: Commit state changes
        run: |
          git config user.name  "govbot-bluesky[bot]"
          git config user.email "govbot-bluesky[bot]@users.noreply.github.com"
          git add topics/*/bills_used.json topics/*/bills_raw topics/*/bills_full_text || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update posted state (shard ${{ matrix.shard }}) [skip ci]"
          # All three shards push to the same branch concurrently. They write
          # disjoint topics/<name>/ folders, so rebasing onto another shard's
          # commit is always clean; retry with backoff until the push lands.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt); rebasing on latest and retrying."
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            sleep $(( attempt * 2 ))
          done

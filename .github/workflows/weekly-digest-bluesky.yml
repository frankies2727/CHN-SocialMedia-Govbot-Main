name: govbot-bluesky-weekly-digest

on:
  # Friday 21:00 UTC = ~4 pm ET (5 pm EDT) -- captures the legislative week
  # and gives readers weekend content.
  schedule:
    - cron: "0 17 * * FRI"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: govbot-bluesky-weekly-digest
  cancel-in-progress: false

# All topics run from the same govbot fetch + Ollama install. Adding a
# topic means dropping a topics/<name>/config.yml and adding the
# matching BLUESKY_HANDLE_<NAME> / BLUESKY_APP_PASSWORD_<NAME> repo secrets.

defaults:
  run:
    shell: bash

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Split the 13 topics across two shards that run in parallel on separate
    # runners. Each shard repeats the shared setup (govbot clone + Ollama) but
    # only builds ~half the digests, keeping each job under the 60-minute budget.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    env:
      LLM_MODEL: "gemma3:4b"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install poppler-utils (pdftotext)
        # Lets scripts/bill_text.py extract full bill text from PDFs for the
        # digest summaries; degrades gracefully to abstract-only if absent.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install govbot, fetch all supported states, dump JSONL
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true

          # Clone every supported repo in one parallel invocation instead of a
          # per-state shell loop. The revamped govbot exits 0 even when an
          # individual repo fails, so no per-state skip guard is needed.
          govbot clone all --parallel 8

          govbot logs --limit 8200 > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.LLM_MODEL }}-v1

      - name: Cache Ollama binary
        # Bump the -v1 suffix to force a fresh install (e.g. to pick up a
        # new Ollama release).
        uses: actions/cache@v4
        with:
          path: ~/.ollama-bin
          key: ollama-bin-v1-linux-amd64

      - name: Cache extracted bill text
        # bill_text.py caches PDF-extracted text in .bill_text_cache/, keyed by
        # a hash of the document URL — content-addressed, so entries never go
        # stale. Persisting it across runs skips re-downloading and re-running
        # pdftotext for bills already processed on an earlier day (bills stay in
        # the freshness window for weeks). The run-scoped key always saves a
        # fresh, grown cache; restore-keys pulls the most recent prior one, and
        # the shared prefix lets every poster reuse text any other already
        # fetched. The shard suffix keeps the two parallel shards from racing on
        # the same save key.
        uses: actions/cache@v4
        with:
          path: .bill_text_cache
          key: bill-text-cache-${{ github.run_id }}-${{ github.run_attempt }}-shard${{ matrix.shard }}
          restore-keys: |
            bill-text-cache-

      - name: Install Ollama and pull the LLM model
        run: |
          if [ -f "$HOME/.ollama-bin/usr-local.tar" ]; then
            echo "Restoring Ollama binary from cache."
            sudo tar -C / -xf "$HOME/.ollama-bin/usr-local.tar"
          else
            curl -fsSL https://ollama.com/install.sh | sh
            mkdir -p "$HOME/.ollama-bin"
            PATHS="usr/local/bin/ollama"
            [ -d /usr/local/lib/ollama ] && PATHS="$PATHS usr/local/lib/ollama"
            sudo tar -C / -cf "$HOME/.ollama-bin/usr-local.tar" $PATHS
            sudo chown -R "$USER:$USER" "$HOME/.ollama-bin"
          fi
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            sleep 1
          done
          if ollama list | awk 'NR>1 {print $1}' | grep -qx "$LLM_MODEL"; then
            echo "$LLM_MODEL already present, skipping pull."
          else
            ollama pull "$LLM_MODEL"
          fi
          ollama list

      - name: Build and post weekly digest thread (all topics)
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          LLM_API_URL: "http://localhost:11434/api/chat"
          DIGEST_LOOKBACK_DAYS: "7"
          DIGEST_MAX_HIGHLIGHTS: "6"
          DIGEST_PER_STATE_CAP: "2"
        run: |
          shopt -s nullglob
          # Assign topics to this shard by their sorted position (topics/*/
          # globs alphabetically). index % NUM_SHARDS interleaves them into a
          # balanced 7/6 split that auto-rebalances when topics are added.
          SHARD="${{ matrix.shard }}"
          NUM_SHARDS=2
          i=0
          for topic_dir in topics/*/; do
            topic=$(basename "$topic_dir")
            [ -f "$topic_dir/config.yml" ] || continue
            if [ $(( i % NUM_SHARDS )) -ne "$SHARD" ]; then
              i=$(( i + 1 )); continue
            fi
            i=$(( i + 1 ))
            echo "=== Digest for topic: $topic (shard $SHARD/$NUM_SHARDS) ==="
            BOT_TOPIC="$topic" python scripts/weekly_digest_bluesky.py \
              || echo "  $topic digest failed, continuing with next topic"
          done

# Immigration bot — best-effort seed. Tune keywords after a week of dry-run
# output by inspecting which bills get matched and which don't.
#
# `keywords` are core terms — a single hit in a bill title is enough to match.
# `context_keywords` are broad terms that show up in unrelated bills (e.g.
# "human trafficking" in transit-safety bills); they only count toward a match
# when a core keyword also appears in the bill.

name: immigration
display_name: "Immigration"
prompt_topic: "immigration, asylum, refugee resettlement, and immigrant rights"
default_emoji: "🛂"

keywords:
  - immigration
  - immigrant
  - immigrants
  - undocumented
  - noncitizen
  - non-citizen
  - migrant
  - migrants
  - refugee
  - refugees
  - asylum
  - asylee
  - asylees
  - visa
  - visas
  - green card
  - permanent resident
  - naturalization
  - naturalized
  - dreamer
  - dreamers
  - DACA
  - sanctuary city
  - sanctuary cities
  - sanctuary state
  - sanctuary jurisdiction
  - ICE
  - immigration and customs enforcement
  - border
  - borderlands
  - border patrol
  - deportation
  - deport
  - deported
  - removal proceedings
  - immigration detention
  - immigration detention center
  - ICE detention
  - civil detention
  - detainee
  - detainees
  - work authorization
  - work permit
  - E-Verify
  - eVerify
  - mixed-status family
  - mixed status family
  - in-state tuition

# Broad terms that only count as a match alongside a core keyword above.
# "language access"/"LEP" describe a service population that also covers
# labor bills about interpreters — they only signal immigration alongside a
# core keyword.
context_keywords:
  - human trafficking
  - smuggling
  - language access
  - LEP
  - limited english proficient
  # "citizenship" alone catches felony rights-restoration ("rights of citizenship")
  # and licensure boilerplate ("citizenship or lawful presence"). Only count it
  # when a core immigration keyword also appears.
  - citizenship

emojis:
  - emoji: "🌎"
    match: ["refugee", "asylum", "asylee"]
  - emoji: "🆔"
    match: ["green card", "visa", "permanent resident", "naturalization", "citizenship", "work authorization", "work permit"]
  - emoji: "🚧"
    match: ["border", "border patrol", "borderlands"]
  - emoji: "🏛️"
    match: ["sanctuary city", "sanctuary cities", "sanctuary state", "sanctuary jurisdiction"]
  - emoji: "🎓"
    match: ["dreamer", "DACA", "in-state tuition"]
  - emoji: "👮"
    match: ["ICE", "deportation", "deport", "removal proceedings", "detention", "detainee"]
  - emoji: "🗣️"
    match: ["language access", "LEP", "limited english proficient"]

digest:
  thread_title: "🛂 Immigration Bills Weekly Digest"
  topic_phrase: "immigration"
